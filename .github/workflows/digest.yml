name: Daily tech digest

on:
  # Primary trigger: Cloudflare Worker cron hits repository_dispatch at 10:00 Kyiv.
  # Cloudflare is more reliable than GitHub's scheduled events (which skip at :00).
  repository_dispatch:
    types: [daily-digest]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tech-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Generate and send digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Cloudflare Worker refreshes the OAuth token before each cron and
      # passes a fresh access_token in client_payload. The secret is a
      # fallback for manual workflow_dispatch (will go stale ~8h after seed).
      CLAUDE_CODE_OAUTH_TOKEN: ${{ github.event.client_payload.access_token || secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      DIGEST_WINDOW_HOURS: '24'
      DIGEST_MAX_ITEMS: '15'
      # Comma-separated topic slugs from config/topics.yaml. Empty = all items.
      # Example: 'design,ai-design,ai-lab' for a design-focused digest.
      DIGEST_TOPICS: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Heartbeat (start)
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=🟢 <i>Digest workflow started</i>" \
            > /dev/null

      - name: Run digest pipeline
        run: python3 -m scripts.digest_pipeline

      - name: Commit state if changed
        run: |
          git config user.name  "tech-digest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/seen.json data/last_digest.json
          if git diff --staged --quiet; then
            echo "no state changes, skipping commit"
            exit 0
          fi
          git commit -m "chore: digest $(TZ='Europe/Kyiv' date +%Y-%m-%d-%H%M)"
          for attempt in 1 2 3; do
            if git pull --rebase && git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep 3
          done
          echo "::error::failed to push digest state after 3 attempts"
          exit 1

      - name: Notify failure
        if: failure()
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Digest workflow failed</b>%0Ahttps://github.com/${REPO}/actions/runs/${RUN_ID}" \
            > /dev/null || true
