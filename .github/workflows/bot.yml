name: Telegram bot poll

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize bot runs so two cron ticks can't fight over the same updates /
# the same git ref.
concurrency:
  group: tech-digest-bot
  cancel-in-progress: false

jobs:
  poll:
    name: Handle Telegram commands
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll Telegram for commands
        run: python3 -m scripts.bot_poll

      - name: Commit state / prefs if changed
        run: |
          git config user.name  "tech-digest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add config/user_prefs.yaml data/bot_state.json
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore(bot): state $(TZ='Europe/Kyiv' date +%Y-%m-%d-%H%M)"
          for attempt in 1 2 3; do
            if git pull --rebase && git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep 3
          done
          echo "::error::failed to push bot state after 3 attempts"
          exit 1
