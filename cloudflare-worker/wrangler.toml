name = "tech-news-bot"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets are set via `wrangler secret put <NAME>` — never committed here.
# Required secrets:
#   TELEGRAM_BOT_TOKEN        — bot token from @BotFather
#   TELEGRAM_CHAT_ID          — authorised chat id (owner's DM)
#   TELEGRAM_WEBHOOK_SECRET   — random string, also passed to setWebhook
#   GITHUB_TOKEN              — PAT with `contents:write` on the repo
#   GITHUB_REPO               — "owner/repo" e.g. "reznichenkoandrey/tech_news_bot"

[observability]
enabled = true

# Cron triggers — daily digest scheduler.
# Cloudflare crons are UTC only, so cover both Kyiv DST windows. The worker's
# scheduled() handler gates on the actual Kyiv hour before dispatching.
# Using ":05" instead of ":00" avoids GitHub Actions top-of-hour peak delays.
[triggers]
crons = ["5 7 * * *", "5 8 * * *"]
